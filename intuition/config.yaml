name: Intuition
version: "1.0.0"
slug: intuition
description: AI-powered Home Assistant automation intelligence. Your home just knows.
url: https://github.com/ro7je2jktt88qabky0j1/intuition-ha
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
  armhf: ghcr.io/home-assistant/armhf-base:latest
  armv7: ghcr.io/home-assistant/armv7-base:latest
  i386: ghcr.io/home-assistant/i386-base:latest
init: false
startup: application
boot: auto
panel_icon: mdi:brain
panel_title: Intuition
ingress: true
ingress_port: 8099
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
map:
  - config:rw
options:
  claude_api_key: ""
  log_level: info
schema:
  claude_api_key: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
